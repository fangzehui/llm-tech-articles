# profile_realtime.yml
# 低延迟优先 profile：交互式对话、实时问答、Agent 推理主线
# 决策依据：智谱官方公网通道 TTFT P95 最优；SCNet 国家算力做异常兜底；
#         自部署只在前两条链路全挂时承接尾流量。

profile: realtime

providers:
  - name: zhipu
    base_url: https://open.bigmodel.cn/api/paas/v4
    api_key_env: ZHIPU_API_KEY
    model_alias: glm-5.2
    priority: 10           # 数字越小越优先
    weight: 1.0
    timeout_s: 15.0
    cost_per_million_tokens: 22.0
    enabled: true

  - name: scnet
    # base_url 以国家超算互联网控制台「Chat → 模型 API」入口的实时显示为准
    base_url: https://api.scnet.cn/api/llm/v1
    api_key_env: SCNET_API_KEY
    model_alias: glm-5.2
    priority: 20
    weight: 1.0
    timeout_s: 25.0
    cost_per_million_tokens: 18.0
    enabled: true

  - name: self
    # base_url 由 SELFHOST_BASE_URL 环境变量注入，例如 vLLM / SGLang 推理后端
    base_url: ${SELFHOST_BASE_URL}
    api_key_env: SELFHOST_API_KEY
    model_alias: glm-5.2
    priority: 30
    weight: 1.0
    timeout_s: 60.0
    cost_per_million_tokens: 8.0
    enabled: true

router:
  fallback_strategy: priority    # priority | cost
  circuit_breaker:
    failure_threshold: 0.5       # success_rate 跌破即熔断
    cooldown_s: 60               # 熔断窗口
    half_open_success_rate: 0.8  # 半开恢复初值
    smoothing_alpha: 0.1         # EMA 平滑系数

observability:
  health_check_interval_s: 30
  health_check_timeout_s: 5.0
  prometheus_port: 8000
